# =============================================================
# Tic Tac Toe - Docker Compose (Nakama + PostgreSQL + Frontend)
# =============================================================
# Copy .env.example to .env and set your production values.
# =============================================================

version: "3.8"

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: ttt_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nakama}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-custom-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nakama}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Nakama Game Server ----
  nakama:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ttt_nakama
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NAKAMA_SERVER_KEY=${NAKAMA_SERVER_KEY:-tictactoe_server_key}
      - NAKAMA_CONSOLE_USERNAME=${NAKAMA_CONSOLE_USERNAME:-admin}
      - NAKAMA_CONSOLE_PASSWORD=${NAKAMA_CONSOLE_PASSWORD:-password}
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address ${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-localdb}@postgres:5432/${POSTGRES_DB:-nakama} &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address ${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-localdb}@postgres:5432/${POSTGRES_DB:-nakama}
        --socket.server_key ${NAKAMA_SERVER_KEY:-tictactoe_server_key}
        --console.username ${NAKAMA_CONSOLE_USERNAME:-admin}
        --console.password ${NAKAMA_CONSOLE_PASSWORD:-password}
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP/WebSocket API
      - "7351:7351"   # Console (admin dashboard)
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    links:
      - "postgres:db"
    restart: unless-stopped

  # ---- Frontend (React/Vite → nginx) ----
  # For production, deploy to Vercel instead. This service
  # is kept for local development / Docker-only deployments.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_NAKAMA_HOST: ${VITE_NAKAMA_HOST:-localhost}
        VITE_NAKAMA_PORT: ${VITE_NAKAMA_PORT:-7350}
        VITE_NAKAMA_KEY: ${NAKAMA_SERVER_KEY:-tictactoe_server_key}
        VITE_NAKAMA_SSL: ${VITE_NAKAMA_SSL:-false}
    container_name: ttt_frontend
    depends_on:
      - nakama
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
