server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # BEGIN_PROXY — reverse proxy to Nakama (avoids CORS in production)
    location /v2/ {
        proxy_pass https://__NAKAMA_BACKEND__/v2/;
        proxy_ssl_server_name on;
        proxy_set_header Host __NAKAMA_BACKEND__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass https://__NAKAMA_BACKEND__/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_set_header Host __NAKAMA_BACKEND__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /healthcheck {
        proxy_pass https://__NAKAMA_BACKEND__/healthcheck;
        proxy_ssl_server_name on;
        proxy_set_header Host __NAKAMA_BACKEND__;
    }
    # END_PROXY

    # SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
